name: RoomOS Pro — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint & Type check ────────────────────────────────────────
  lint:
    name: Lint & Types
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (backend)
        run: cd backend && npx tsc --noEmit

      - name: TypeScript check (frontend)
        run: cd frontend && npx tsc --noEmit

  # ── Build & Push Docker image ─────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-22.04
    needs: lint
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy via EasyPanel webhook ──────────────────────────────
  deploy:
    name: Deploy to EasyPanel
    runs-on: ubuntu-22.04
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Trigger EasyPanel deploy webhook
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.EASYPANEL_TOKEN }}" \
            "${{ secrets.EASYPANEL_WEBHOOK_URL }}" \
            --fail-with-body
        continue-on-error: false

      - name: Notify deploy success
        if: success()
        run: echo "✅ Deploy para EasyPanel iniciado com sucesso!"

      - name: Notify deploy failure
        if: failure()
        run: echo "❌ Falha no deploy — verifique os logs do EasyPanel"
